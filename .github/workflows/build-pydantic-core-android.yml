name: Build pydantic-core Android Wheels

on:
  workflow_dispatch:
    inputs:
      pydantic_core_version:
        description: "pydantic-core version tag"
        required: true
        default: "v2.41.5"
      python_version:
        description: "Python version to target (e.g. 3.12 or 3.13)"
        required: true
        default: "3.13"
      android_api:
        description: "Android API level (min 28)"
        required: true
        default: "28"
  push:
    tags:
      - "android-pydantic-core-*"

env:
  PYDANTIC_CORE_VERSION: ${{ github.event.inputs.pydantic_core_version || 'v2.41.5' }}
  PYTHON_VERSION:        ${{ github.event.inputs.python_version        || '3.13'    }}
  ANDROID_API:           ${{ github.event.inputs.android_api           || '28'      }}
  NDK_VERSION:           r26d
  MATURIN_VERSION:       "1.11.0"

jobs:
  build:
    name: "${{ matrix.abi }} (API ${{ github.event.inputs.android_api || '28' }})"
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: aarch64
            rust_target: aarch64-linux-android
            termux_arch: arm64
            pointer_width: 64
          - abi: armv7
            rust_target: armv7-linux-androideabi
            termux_arch: arm
            pointer_width: 32
          - abi: x86_64
            rust_target: x86_64-linux-android
            termux_arch: x86_64
            pointer_width: 64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone pydantic-core ${{ env.PYDANTIC_CORE_VERSION }}
        run: |
          git clone --depth 1 \
            --branch ${{ env.PYDANTIC_CORE_VERSION }} \
            https://github.com/pydantic/pydantic-core.git
          echo "PYDANTIC_CORE_DIR=$GITHUB_WORKSPACE/pydantic-core" >> $GITHUB_ENV

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantic-core/target
          key: cargo-android-${{ matrix.rust_target }}-${{ env.PYDANTIC_CORE_VERSION }}-${{ hashFiles('pydantic-core/Cargo.lock') }}
          restore-keys: |
            cargo-android-${{ matrix.rust_target }}-${{ env.PYDANTIC_CORE_VERSION }}-
            cargo-android-${{ matrix.rust_target }}-

      - name: Install Rust stable + target ${{ matrix.rust_target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          curl -fsSL "https://dl.google.com/android/repository/${NDK_ZIP}" -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          NDK_HOME="/opt/android-ndk-${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          echo "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Install maturin ${{ env.MATURIN_VERSION }}
        run: pip install "maturin==${{ env.MATURIN_VERSION }}"

      # ── Set linker via env var (avoids TOML indentation bugs) ───────────
      - name: Set CARGO_TARGET linker env var
        run: |
          API=${{ env.ANDROID_API }}
          NDK_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          case "${{ matrix.rust_target }}" in
            aarch64-linux-android)
              echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android${API}-clang" >> $GITHUB_ENV ;;
            armv7-linux-androideabi)
              echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=${NDK_BIN}/armv7a-linux-androideabi${API}-clang" >> $GITHUB_ENV ;;
            x86_64-linux-android)
              echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=${NDK_BIN}/x86_64-linux-android${API}-clang" >> $GITHUB_ENV ;;
          esac

      # ── Write manual pyo3 cross-compilation config ───────────────────────
      # Why: When cross-compiling for Android, pyo3's build script can't run
      # the target Python to detect its config, so it falls back to linking
      # -lpython3.x. But libpython doesn't exist in the NDK sysroot — Android
      # extension modules get Python symbols resolved at runtime via dlopen.
      #
      # suppress_build_script_link_lines=true is the key: it tells pyo3 NOT
      # to emit `-lpython3.x` to the linker. The .so will still work because
      # Python resolves the symbols when it loads the extension module.
      - name: Write pyo3 cross-compile config
        run: |
          PY_VER="${{ env.PYTHON_VERSION }}"
          # e.g. "3.13" → minor="13", lib_name="python3.13"
          PY_MINOR=$(echo "$PY_VER" | cut -d. -f2)

          CONFIG_FILE="/tmp/pyo3-cross-config-${{ matrix.rust_target }}.txt"

          cat > "$CONFIG_FILE" <<EOF
          implementation=CPython
          version=$PY_VER
          shared=true
          abi3=false
          lib_name=python${PY_VER}
          lib_dir=
          executable=
          pointer_width=${{ matrix.pointer_width }}
          build_flags=
          suppress_build_script_link_lines=true
          EOF

          # Strip leading whitespace (heredoc indentation from YAML)
          sed -i 's/^[[:space:]]*//' "$CONFIG_FILE"

          echo "PYO3_CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
          echo "--- pyo3 config ---"
          cat "$CONFIG_FILE"

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build wheel
        working-directory: ${{ env.PYDANTIC_CORE_DIR }}
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          # Maturin's own Android API level var — distinct from ANDROID_API
          ANDROID_API_LEVEL: ${{ env.ANDROID_API }}
          # PYO3_CONFIG_FILE is already set above — maturin picks it up
          # and skips its own Python detection entirely.
          # Do NOT also set PYO3_CROSS / PYO3_CROSS_PYTHON_VERSION when
          # using PYO3_CONFIG_FILE; they conflict and confuse the build script.
        run: |
          maturin build \
            --release \
            --target ${{ matrix.rust_target }} \
            --interpreter python${{ env.PYTHON_VERSION }} \
            --manylinux off \
            --out dist/ \
            -v

          echo "Built wheels:"
          ls -lh dist/

      # ── Rename wheel tag → android_<API>_<arch> ──────────────────────────
      - name: Rename wheel tag
        run: |
          API=${{ env.ANDROID_API }}
          case "${{ matrix.abi }}" in
            aarch64) TERMUX_ARCH="arm64"  ;;
            armv7)   TERMUX_ARCH="arm"    ;;
            x86_64)  TERMUX_ARCH="x86_64" ;;
          esac
          ANDROID_TAG="android_${API}_${TERMUX_ARCH}"

          for WHL in ${{ env.PYDANTIC_CORE_DIR }}/dist/*.whl; do
            NEW=$(echo "$WHL" \
              | sed "s/linux_aarch64/${ANDROID_TAG}/g" \
              | sed "s/linux_armv7l/${ANDROID_TAG}/g" \
              | sed "s/linux_x86_64/${ANDROID_TAG}/g")
            if [ "$WHL" != "$NEW" ]; then
              mv "$WHL" "$NEW"
              echo "Renamed: $(basename $WHL) → $(basename $NEW)"
            fi
          done

          echo "Final wheels:"
          ls -lh ${{ env.PYDANTIC_CORE_DIR }}/dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-core-android-${{ matrix.abi }}-py${{ env.PYTHON_VERSION }}
          path: ${{ env.PYDANTIC_CORE_DIR }}/dist/*.whl
          retention-days: 30

  release:
    name: Package all wheels
    needs: build
    runs-on: ubuntu-22.04
    if: success()

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-wheels/
          pattern: "pydantic-core-android-*"
          merge-multiple: true

      - name: List collected wheels
        run: ls -lh all-wheels/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: all-wheels/*.whl
          generate_release_notes: true
          name: "pydantic-core ${{ env.PYDANTIC_CORE_VERSION }} Android wheels"
          body: |
            ## pydantic-core Android wheels (Termux)

            | Wheel | Target |
            |---|---|
            | `*android_28_arm64*`  | Modern ARM64 Android — Galaxy A14 5G, Pixels, etc. |
            | `*android_28_arm*`    | 32-bit ARM Android |
            | `*android_28_x86_64*` | Android emulators / x86 devices |

            ### Install in Termux
            ```bash
            pip install pydantic_core-*-android_28_arm64.whl
            ```
