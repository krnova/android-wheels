name: Build Mesa with virpipe (Void Linux aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Void Linux x86_64 container
        run: docker pull ghcr.io/void-linux/void-linux:latest-full-x86_64

      - name: Cache void-packages
        uses: actions/cache@v4
        with:
          path: |
            void-packages/hostdir
            void-packages/masterdir
          key: void-xbps-src-${{ runner.os }}-mesa
          restore-keys: |
            void-xbps-src-${{ runner.os }}-

      - name: Write builder script
        run: |
          cat > ${{ github.workspace }}/build.sh << 'SCRIPT'
          #!/bin/sh
          set -e

          xbps-install -Syu xbps -y
          xbps-install -Su --ignore base-files -y || true
          xbps-install -y git xtools base-devel sudo

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          groupadd xbuilder 2>/dev/null || true
          usermod -aG xbuilder builder

          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages || true
          chown -R builder:builder /void-packages
          chmod 777 /output

          cat > /home/builder/xbps-build.sh << 'BUILDER'
          #!/bin/sh
          set -e
          cd /void-packages

          echo XBPS_ALLOW_CHROOT_BREAKOUT=yes >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          ./xbps-src binary-bootstrap

          TEMPLATE=srcpkgs/mesa/template
          grep -E "_have_virgl|gallium_drivers|vulkan_drivers" $TEMPLATE

          ./xbps-src -a aarch64 pkg mesa

          echo "=== Packages built ==="
          find hostdir/binpkgs -name "*.xbps"

          find hostdir/binpkgs -name "*.xbps" -exec cp {} /output/ \;

          echo "=== Searching for virgl_dri.so ==="
          find masterdir/destdir -name "virgl_dri.so" 2>/dev/null || echo "NOT FOUND in destdir"
          find masterdir/builddir -name "virgl_dri.so" 2>/dev/null || echo "NOT FOUND in builddir"

          for so in virgl_dri.so virtio_gpu_dri.so; do
            found=$(find masterdir/ -name "$so" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "Found $so at $found"
              cp "$found" /output/
            else
              echo "WARNING: $so not found anywhere"
            fi
          done

          echo "=== Final /output contents ==="
          ls -lh /output/
          BUILDER

          chmod +x /home/builder/xbps-build.sh
          su builder -c /home/builder/xbps-build.sh
          SCRIPT
          chmod +x ${{ github.workspace }}/build.sh

      - name: Build Mesa for aarch64
        run: |
          docker run --rm \
            --privileged \
            -v ${{ github.workspace }}:/output \
            -v ${{ github.workspace }}/void-packages:/void-packages \
            ghcr.io/void-linux/void-linux:latest-full-x86_64 \
            /output/build.sh

      - name: List output
        run: ls -lh ${{ github.workspace }}/

      - name: Upload Mesa packages
        uses: actions/upload-artifact@v4
        with:
          name: mesa-virpipe-aarch64
          path: |
            ${{ github.workspace }}/*.xbps
            ${{ github.workspace }}/virgl_dri.so
            ${{ github.workspace }}/virtio_gpu_dri.so
          if-no-files-found: warn
          retention-days: 7
