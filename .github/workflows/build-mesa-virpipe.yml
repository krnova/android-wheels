name: Build Mesa with virpipe and virtio (Void Linux aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pull native Void Linux x86_64 container
        run: |
          docker pull ghcr.io/void-linux/void-linux:latest-full-x86_64

      - name: Cross-compile Mesa for aarch64
        run: |
          docker run --rm \
            --privileged \
            -v ${{ github.workspace }}:/output \
            ghcr.io/void-linux/void-linux:latest-full-x86_64 \
            sh -c '
              set -e

              # Update repos
              xbps-install -Syu xbps -y
              xbps-install -Su --ignore base-files -y || true

              # Install dependencies
              xbps-install -y git xtools base-devel sudo

              # Create non-root user
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

              git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
              chown -R builder:builder /void-packages
              chown builder:builder /output

              su builder -c '\''\
                set -e
                cd /void-packages

                # Bootstrap the native environment
                ./xbps-src binary-bootstrap

                TEMPLATE=srcpkgs/mesa/template

                # Patch Gallium drivers to include virpipe
                sed -i "s/gallium_drivers=\"\([^\"]*\)\"/gallium_drivers=\"\1,virpipe\"/" $TEMPLATE

                # Patch Vulkan drivers to include virtio (Venus)
                sed -i "s/vulkan_drivers=\"\([^\"]*\)\"/vulkan_drivers=\"\1,virtio\"/" $TEMPLATE

                # Verify patches
                grep -E "gallium_drivers|vulkan_drivers" $TEMPLATE

                # Cross-compile for aarch64
                ./xbps-src -a aarch64 pkg mesa

                # Copy packages to output
                find hostdir/binpkgs -name "*.xbps" | xargs -I{} cp {} /output/
              '\''

      - name: Upload Mesa packages
        uses: actions/upload-artifact@v4
        with:
          name: mesa-virpipe-aarch64
          path: "*.xbps"
          retention-days: 7
